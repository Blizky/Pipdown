<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#070707" />
    <title>Pipdown</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles/app.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Daily camera diary</p>
          <h1>Pipdown</h1>
        </div>
        <button id="settingsToggle" class="icon-button icon-only" type="button" aria-label="Open settings">
          <img src="/assets/icons/menu_fill.svg" alt="" />
        </button>
      </header>

      <main class="camera-stage">
        <section class="preview-card" aria-label="Camera preview">
          <div id="previewFrame" class="preview-frame ratio-1-1">
            <video id="cameraVideo" class="camera-video" playsinline muted autoplay></video>
            <canvas id="stillCanvas" class="still-canvas" aria-hidden="true"></canvas>
            <div id="cameraPlaceholder" class="camera-placeholder">
              <strong>Camera access needed</strong>
              <span>Allow camera permission to start snapping.</span>
            </div>
            <div id="recordingOverlay" class="recording-overlay" hidden>
              <svg class="progress-ring" viewBox="0 0 120 120" aria-hidden="true">
                <circle class="progress-track" cx="60" cy="60" r="52"></circle>
                <circle id="progressCircle" class="progress-fill" cx="60" cy="60" r="52"></circle>
              </svg>
              <span id="recordingStatus">Recording</span>
            </div>
          </div>
        </section>

        <div class="capture-controls">
          <button id="shutterButton" class="shutter-button" type="button" aria-label="Capture snap">
            <span></span>
          </button>
          <p id="cameraStatus" class="status-line">Starting camera...</p>
        </div>
      </main>

      <section id="settingsPanel" class="settings-panel" aria-label="Settings" hidden>
        <div class="panel-card">
          <div class="panel-header">
            <h2>Settings</h2>
            <button id="settingsClose" class="ghost-button" type="button">Close</button>
          </div>
          <label>
            <span>User name</span>
            <input id="userNameInput" type="text" placeholder="Your name" autocomplete="name" />
          </label>
          <label>
            <span>Snap duration</span>
            <select id="durationSelect">
              <option value="1">1 second</option>
              <option value="2" selected>2 seconds</option>
              <option value="3">3 seconds</option>
            </select>
          </label>
          <label>
            <span>Camera</span>
            <select id="cameraSelect"></select>
          </label>
          <button id="clearCacheButton" class="danger-button" type="button">Clear all cache</button>
        </div>
      </section>

      <section id="libraryDrawer" class="library-drawer" aria-label="Snap library">
        <button id="drawerHandle" class="drawer-handle" type="button" aria-expanded="false">
          <span></span>
          <strong>Library</strong>
        </button>
        <div class="drawer-content">
          <div class="library-actions">
            <div class="selected-day-block">
              <img id="selectedDayThumb" class="selected-day-thumb" alt="" hidden />
              <span id="selectedDayStart" class="selected-day-start">Start</span>
              <span class="selected-day-meta">
                <p class="eyebrow">Selected day</p>
                <h2 id="selectedDayTitle">Today</h2>
              </span>
            </div>
            <button id="exportButton" class="primary-button icon-only" type="button" aria-label="Create digest">
              <img src="/assets/icons/download_line.svg" alt="" />
            </button>
          </div>
          <div id="exportResult" class="export-result" hidden></div>
          <div id="snapList" class="snap-list" aria-label="Snaps for selected day"></div>
        </div>
      </section>

      <section id="digestPreviewModal" class="digest-modal" hidden>
        <div class="digest-modal-toolbar">
          <button id="digestPreviewSave" class="digest-modal-icon" type="button" aria-label="Save digest">
            <img src="/assets/icons/download_fill.svg" alt="" />
          </button>
          <button id="digestPreviewClose" class="digest-modal-icon" type="button" aria-label="Close preview">
            <img src="/assets/icons/close_fill.svg" alt="" />
          </button>
        </div>
        <video id="digestPreviewVideo" controls playsinline></video>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
